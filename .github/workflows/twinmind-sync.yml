name: TwinMind para Notion Sync
on:
  schedule:
    - cron: "30 5 * * *"   # 02:30 America/Sao_Paulo (UTC-3) = 05:30 UTC
  workflow_dispatch: {}
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run sync
        env:
            NOTION_TOKEN: $❰❰ secrets.NOTION_TOKEN ❱❱
            NOTION_DATABASE_ID: $❰❰ secrets.NOTION_DATABASE_ID ❱❱
            TWINMIND_TOKENS: $❰❰ secrets.TWINMIND_TOKENS ❱❱
            TWINMIND_CLIENT: $❰❰ secrets.TWINMIND_CLIENT ❱❱
                 
